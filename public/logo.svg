<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="blackGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#444444" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="blackGrad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#444444" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    
    <!-- Add drop shadow for the 3D effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Top Black Triangle -->
  <polygon points="15,20 80,20 40,48" fill="url(#blackGrad1)" filter="url(#shadow)" />
  
  <!-- Bottom Black Triangle -->
  <polygon points="20,95 85,95 60,68" fill="url(#blackGrad2)" filter="url(#shadow)" />
  
  <!-- Middle Blue Diagonal -->
  <polygon points="85,18 48,50 15,92 52,60" fill="url(#blueGrad)" filter="url(#shadow)" />
</svg>
